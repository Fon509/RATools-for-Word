name: Release DOTM

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing tag to package and release, for example v0.6.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-dotm:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Package DOTM and templates
        shell: pwsh
        run: |
          $tag = "${{ env.RELEASE_TAG }}"
          $workspace = $env:GITHUB_WORKSPACE
          $changelogPath = Join-Path $workspace "CHANGELOG.md"
          $dotmDir = Join-Path $workspace "dotm"
          $templateDir = Join-Path $workspace "template"
          $distDir = Join-Path $workspace "dist"
          $zipPath = Join-Path $distDir "RATools_$tag.zip"
          $dotmPath = Join-Path $distDir "RATools_$tag.dotm"
          $releaseNotesPath = Join-Path $distDir "release-notes.md"
          $cnTemplate = Join-Path $templateDir "master-template-cn.dotx"
          $enTemplate = Join-Path $templateDir "master-template-en.dotx"

          if (-not (Test-Path -LiteralPath $changelogPath)) {
            throw "Missing changelog file: $changelogPath"
          }

          if (-not (Test-Path -LiteralPath $dotmDir)) {
            throw "Missing dotm directory: $dotmDir"
          }

          if (-not (Test-Path -LiteralPath $cnTemplate)) {
            throw "Missing template file: $cnTemplate"
          }

          if (-not (Test-Path -LiteralPath $enTemplate)) {
            throw "Missing template file: $enTemplate"
          }

          if (Test-Path -LiteralPath $distDir) {
            Remove-Item -LiteralPath $distDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $distDir | Out-Null

          $changelogText = Get-Content -LiteralPath $changelogPath -Raw
          $escapedTag = [Regex]::Escape($tag)
          $pattern = "(?ms)^#\s+$escapedTag\s*`r?`n(.*?)(?=^#\s+|\z)"
          $match = [Regex]::Match($changelogText, $pattern)

          if (-not $match.Success) {
            throw "Missing changelog section for tag: $tag"
          }

          $releaseNotes = $match.Groups[1].Value.Trim()

          if ([string]::IsNullOrWhiteSpace($releaseNotes)) {
            throw "Empty changelog section for tag: $tag"
          }

          Set-Content -LiteralPath $releaseNotesPath -Value $releaseNotes

          Compress-Archive -Path (Join-Path $dotmDir "*") -DestinationPath $zipPath -CompressionLevel Optimal
          Move-Item -LiteralPath $zipPath -Destination $dotmPath

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: dist/release-notes.md
          files: |
            dist/*.dotm
            template/master-template-cn.dotx
            template/master-template-en.dotx
